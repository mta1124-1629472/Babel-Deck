name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-core-test:
    name: Build & Core Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Babel-Deck.sln

      - name: Build
        run: dotnet build Babel-Deck.sln --no-restore --configuration Release

      - name: Run core tests only
        run: >
          dotnet test BabelDeck.Tests/BabelDeck.Tests.csproj
          --no-build
          --configuration Release
          --filter "Category!=Integration&Category!=RequiresPython&Category!=RequiresFfmpeg&Category!=RequiresExternalTranslation"
          --logger "trx;LogFileName=core-results.trx"
          --results-directory TestResults

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: core-test-results
          path: TestResults/core-results.trx
          retention-days: 3
