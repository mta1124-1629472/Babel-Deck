name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore BabelPlayer.slnx

      - name: Build (TreatWarningsAsErrors enforced)
        run: dotnet build BabelPlayer.slnx --no-restore --configuration Release

      - name: Test
        run: >
          dotnet test BabelPlayer.slnx
          --no-build
          --configuration Release
          --logger "trx;LogFileName=results.trx"
          --results-directory TestResults

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/results.trx
          retention-days: 3
