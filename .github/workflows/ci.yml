name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-core-test:
    name: Build & Core Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false
        env:
          GIT_LFS_SKIP_SMUDGE: '1'

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Babel-Player.sln

      - name: Build
        run: dotnet build Babel-Player.sln --no-restore --configuration Release

      - name: Run core tests with coverage
        run: >
          dotnet test BabelPlayer.Tests/BabelPlayer.Tests.csproj
          --no-build
          --configuration Release
          --filter "Category!=Integration&Category!=RequiresPython&Category!=RequiresFfmpeg&Category!=RequiresExternalTranslation"
          --logger "trx;LogFileName=core-results.trx"
          --results-directory TestResults
          --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: core-test-results
          path: TestResults/core-results.trx
          retention-days: 3

      - name: Upload coverage to Codacy
        if: always()
        env:
          CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
        run: |
          if [ -z "${CODACY_PROJECT_TOKEN}" ]; then
            echo "Skipping Codacy upload: CODACY_PROJECT_TOKEN is not set."
            exit 0
          fi

           bash <(curl -Ls https://coverage.codacy.com/get.sh) report \
             --language C# \
             --coverage-reports TestResults/*/coverage.cobertura.xml \
             --partial \
             --project-token "$CODACY_PROJECT_TOKEN"
