name: '📋 Qwen Code Scheduled Issue Triage'

on:
  schedule:
    - cron: '0 * * * *' # Runs every hour
  pull_request:
    branches:
      - 'main'
      - 'release/**/*'
    paths:
      - '.github/workflows/qwen-scheduled-triage.yml'
  push:
    branches:
      - 'main'
      - 'release/**/*'
    paths:
      - '.github/workflows/qwen-scheduled-triage.yml'

concurrency:
  group: '${{ github.workflow }}'
  cancel-in-progress: true

defaults:
  run:
    shell: 'bash'

jobs:
  discover_candidates:
    runs-on: 'ubuntu-latest'
    timeout-minutes: 5
    permissions:
      contents: 'read'
      issues: 'read'
      pull-requests: 'read'
    steps:
      - name: 'Install gh and jq'
        run: |-
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y -qq gh jq >/dev/null
          echo '✅ gh and jq installed successfully'

      - name: 'Find trusted triage requests'
        id: 'find_candidates'
        env:
          GITHUB_REPOSITORY: '${{ github.repository }}'
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN || github.token }}'
        run: |-
          set -euo pipefail

          echo '🔍 Discovering trusted issues explicitly requested for triage...'

          if ! command -v gh >/dev/null 2>&1; then
            echo '❌ GitHub CLI (gh) is not available on this runner.' >&2
            exit 1
          fi

          if ! command -v jq >/dev/null 2>&1; then
            echo '❌ jq is not available on this runner.' >&2
            exit 1
          fi

          if ! CANDIDATES="$(gh issue list \
            --state 'open' \
            --search 'label:"status/needs-triage"' \
            --json number,title,body,authorAssociation \
            --limit '100' \
            --repo "${GITHUB_REPOSITORY}")"; then
            echo '❌ Failed to query issues with gh issue list.' >&2
            exit 1
          fi

          if [[ -z "${CANDIDATES}" ]]; then
            echo '❌ gh issue list returned empty output.' >&2
            exit 1
          fi

          if ! echo "${CANDIDATES}" | jq -e 'type == "array"' >/dev/null; then
            echo '❌ gh issue list did not return a JSON array.' >&2
            exit 1
          fi

          ISSUES="$(echo "${CANDIDATES}" | jq '[
            .[]
            | select((.authorAssociation // "") as $assoc
              | ($assoc == "OWNER" or $assoc == "MEMBER" or $assoc == "COLLABORATOR"))
            | select(((.body // "") | test("(?m)^@qwen-code[[:space:]]+/triage\\b")))
          ]')"

          CANDIDATE_COUNT="$(echo "${CANDIDATES}" | jq 'length')"
          ISSUE_COUNT="$(echo "${ISSUES}" | jq 'length')"
          echo "📊 Candidate issues with status/needs-triage: ${CANDIDATE_COUNT}"
          echo "✅ Trusted, explicitly requested triage issues ready for manual execution: ${ISSUE_COUNT} 🎯"

      - name: 'Publish candidate summary'
        env:
          GITHUB_REPOSITORY: '${{ github.repository }}'
        run: |-
          {
            echo '## Scheduled triage candidate discovery'
            echo ''
            echo '- This workflow does **not** call Qwen or use API keys.'
            echo '- To execute triage, run `.github/workflows/qwen-manual-triage.yml` manually.'
            echo ''
            echo 'Manual execution command requirement per issue:'
            echo '- Body must include `@qwen-code /triage` on its own line.'
            echo '- Author association must be OWNER, MEMBER, or COLLABORATOR.'
          } >> "${GITHUB_STEP_SUMMARY}"
