name: Release Win x64

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-win-x64:
    name: Publish Windows x64 Self-Contained Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Babel-Player.sln -r win-x64

      - name: Build
        run: dotnet build Babel-Player.sln --no-restore --configuration Release -r win-x64

      - name: Run architecture checks
        run: python scripts/check-architecture.py

      - name: Run core tests
        run: >
          dotnet test BabelPlayer.Tests/BabelPlayer.Tests.csproj
          --no-build
          --configuration Release
          --filter "Category!=Integration&Category!=RequiresPython&Category!=RequiresFfmpeg&Category!=RequiresExternalTranslation"

      - name: Download FFmpeg for Windows x64
        shell: pwsh
        run: |
          $ffmpegUrl = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          $ffmpegZip = "ffmpeg.zip"
          Invoke-WebRequest -Uri $ffmpegUrl -OutFile $ffmpegZip
          Expand-Archive -Path $ffmpegZip -DestinationPath "ffmpeg_temp"
          $ffmpegExe = Get-ChildItem -Path "ffmpeg_temp" -Filter "ffmpeg.exe" -Recurse | Select-Object -First 1
          if (-not $ffmpegExe) { throw "Could not find ffmpeg.exe in downloaded archive" }
          New-Item -ItemType Directory -Path "tools/win-x64" -Force | Out-Null
          Move-Item -Path $ffmpegExe.FullName -Destination "tools/win-x64/ffmpeg.exe" -Force
          Remove-Item -Path $ffmpegZip -Force
          Remove-Item -Path "ffmpeg_temp" -Recurse -Force

      - name: Publish self-contained build
        run: >
          dotnet publish BabelPlayer.csproj
          --configuration Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=false
          -o ./publish

      - name: Verify publish output
        shell: pwsh
        run: |
          $exePath = "./publish/BabelPlayer.exe"
          if (-not (Test-Path $exePath)) {
            throw "Expected executable not found at $exePath"
          }
          $ffmpegPath = "./publish/ffmpeg.exe"
          if (-not (Test-Path $ffmpegPath)) {
            throw "Expected FFmpeg binary not found at $ffmpegPath"
          }
          $mpvPath = "./publish/libmpv-2.dll"
          if (-not (Test-Path $mpvPath)) {
            throw "Expected libmpv binary not found at $mpvPath"
          }

      - name: Stage release bundle
        id: stage_bundle
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = "manual"
          }

          $bundleRoot = Join-Path "${{ github.workspace }}" "dist\\Babel-Player-$tag-win-x64-portable"
          if (Test-Path $bundleRoot) {
            Remove-Item -Path $bundleRoot -Recurse -Force
          }

          New-Item -ItemType Directory -Path $bundleRoot -Force | Out-Null
          Copy-Item -Path ".\\publish\\*" -Destination $bundleRoot -Recurse -Force
          Copy-Item -Path ".\\README.md" -Destination (Join-Path $bundleRoot "README.md") -Force
          Copy-Item -Path ".\\LICENSE" -Destination (Join-Path $bundleRoot "LICENSE.txt") -Force
          Copy-Item -Path ".\\docs\\install-windows-release.md" -Destination (Join-Path $bundleRoot "INSTALL-WINDOWS.md") -Force

          "bundle_root=$bundleRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Package self-contained publish output
        id: package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = "manual"
          }
          $bundleDir = "${{ steps.stage_bundle.outputs.bundle_root }}"

          if (-not (Test-Path $bundleDir)) {
            throw "Release bundle not found at $bundleDir"
          }

          New-Item -ItemType Directory -Path "dist" -Force | Out-Null
          $zipPath = "dist/Babel-Player-$tag-win-x64-portable.zip"
          $checksumPath = "dist/Babel-Player-$tag-win-x64-portable.sha256"

          Compress-Archive -Path "$bundleDir\\*" -DestinationPath $zipPath -Force
          $hash = (Get-FileHash -Path $zipPath -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $(Split-Path $zipPath -Leaf)" | Set-Content -Path $checksumPath

          "zip_path=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "checksum_path=$checksumPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: babel-player-${{ github.ref_name || 'manual' }}-win-x64-portable
          path: |
            ${{ steps.package.outputs.zip_path }}
            ${{ steps.package.outputs.checksum_path }}
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.zip_path }}
            ${{ steps.package.outputs.checksum_path }}
          body_path: docs/install-windows-release.md
          generate_release_notes: true
