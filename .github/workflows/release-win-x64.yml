name: Release Win x64

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version_override:
        description: "Version number to embed (e.g. 1.2.0-dev). Defaults to 0.0.0-dev when not set."
        required: false
        default: "0.0.0-dev"

permissions:
  contents: write

jobs:
  publish-win-x64:
    name: Publish Windows x64 Self-Contained Release
    runs-on: windows-latest

    env:
      # Pin ffmpeg to a specific release to prevent silent breakage from always-latest.
      # Update this when a newer release has been validated.
      FFMPEG_VERSION: "2025-04-14-git-3b2a9668b3-essentials_build"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore Babel-Player.sln -r win-x64

      - name: Build
        run: dotnet build Babel-Player.sln --no-restore --configuration Release -r win-x64

      - name: Run architecture checks
        run: python scripts/check-architecture.py

      - name: Run core tests
        run: >
          dotnet test BabelPlayer.Tests/BabelPlayer.Tests.csproj
          --no-build
          --configuration Release
          --filter "Category!=Integration&Category!=RequiresPython&Category!=RequiresFfmpeg&Category!=RequiresExternalTranslation"

      - name: Download FFmpeg for Windows x64
        shell: pwsh
        run: |
          $ffmpegUrl = "https://www.gyan.dev/ffmpeg/builds/packages/ffmpeg-${{ env.FFMPEG_VERSION }}.zip"
          $ffmpegZip = "ffmpeg.zip"
          Write-Host "Downloading FFmpeg ${{ env.FFMPEG_VERSION }} from $ffmpegUrl"
          Invoke-WebRequest -Uri $ffmpegUrl -OutFile $ffmpegZip
          Expand-Archive -Path $ffmpegZip -DestinationPath "ffmpeg_temp"
          $ffmpegExe = Get-ChildItem -Path "ffmpeg_temp" -Filter "ffmpeg.exe" -Recurse | Select-Object -First 1
          if (-not $ffmpegExe) { throw "Could not find ffmpeg.exe in downloaded archive" }
          New-Item -ItemType Directory -Path "tools/win-x64" -Force | Out-Null
          Move-Item -Path $ffmpegExe.FullName -Destination "tools/win-x64/ffmpeg.exe" -Force
          Remove-Item -Path $ffmpegZip -Force
          Remove-Item -Path "ffmpeg_temp" -Recurse -Force

      - name: Publish self-contained build
        shell: pwsh
        run: |
          # Resolve version: strip leading 'v' from tag (e.g. v1.2.0 -> 1.2.0),
          # or fall back to the workflow_dispatch override input.
          $refName = "${{ github.ref_name }}"
          $override = "${{ github.event.inputs.version_override }}"
          if ($refName -match '^v\d') {
            $version = $refName.TrimStart('v')
          } elseif (-not [string]::IsNullOrWhiteSpace($override)) {
            $version = $override
          } else {
            $version = "0.0.0-dev"
          }
          $buildDate = (Get-Date -Format "yyyy-MM-dd")

          Write-Host "Embedding version=$version  buildDate=$buildDate"

          dotnet publish BabelPlayer.csproj `
            --configuration Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=false `
            -p:Version=$version `
            -p:InformationalVersion=$version `
            -p:BuildDate=$buildDate `
            -o ./publish

      - name: Verify publish output
        shell: pwsh
        run: |
          $missing = @()

          # Core app binaries
          if (-not (Test-Path "./publish/BabelPlayer.exe"))  { $missing += "BabelPlayer.exe" }
          if (-not (Test-Path "./publish/ffmpeg.exe"))       { $missing += "ffmpeg.exe" }
          if (-not (Test-Path "./publish/libmpv-2.dll"))     { $missing += "libmpv-2.dll" }
          if (-not (Test-Path "./publish/uv.exe"))           { $missing += "uv.exe" }

          # Inference directory and required files
          $inferenceFiles = @(
            "inference/main.py",
            "inference/requirements.txt",
            "inference/gpu-requirements.txt",
            "inference/gpu-constraints.txt"
          )
          foreach ($f in $inferenceFiles) {
            if (-not (Test-Path "./publish/$f")) { $missing += $f }
          }

          if ($missing.Count -gt 0) {
            $list = $missing -join ", "
            throw "Publish output is missing required files: $list"
          }

          Write-Host "Publish verification passed. All required files present."

      - name: Stage release bundle
        id: stage_bundle
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = "manual"
          }

          $bundleRoot = Join-Path "${{ github.workspace }}" "dist\\Babel-Player-$tag-win-x64-portable"
          if (Test-Path $bundleRoot) {
            Remove-Item -Path $bundleRoot -Recurse -Force
          }

          New-Item -ItemType Directory -Path $bundleRoot -Force | Out-Null
          Copy-Item -Path ".\\publish\\*" -Destination $bundleRoot -Recurse -Force
          Copy-Item -Path ".\\README.md" -Destination (Join-Path $bundleRoot "README.md") -Force
          Copy-Item -Path ".\\LICENSE" -Destination (Join-Path $bundleRoot "LICENSE.txt") -Force
          Copy-Item -Path ".\\docs\\install-windows-release.md" -Destination (Join-Path $bundleRoot "INSTALL-WINDOWS.md") -Force

          "bundle_root=$bundleRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Package self-contained publish output
        id: package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ([string]::IsNullOrWhiteSpace($tag)) {
            $tag = "manual"
          }
          $bundleDir = "${{ steps.stage_bundle.outputs.bundle_root }}"

          if (-not (Test-Path $bundleDir)) {
            throw "Release bundle not found at $bundleDir"
          }

          New-Item -ItemType Directory -Path "dist" -Force | Out-Null
          $zipPath = "dist/Babel-Player-$tag-win-x64-portable.zip"
          $checksumPath = "dist/Babel-Player-$tag-win-x64-portable.sha256"

          Compress-Archive -Path "$bundleDir\\*" -DestinationPath $zipPath -Force
          $hash = (Get-FileHash -Path $zipPath -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $(Split-Path $zipPath -Leaf)" | Set-Content -Path $checksumPath

          "zip_path=$zipPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "checksum_path=$checksumPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --yes --no-progress

      - name: Build installer
        id: installer
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ([string]::IsNullOrWhiteSpace($tag) -or $tag -eq "main") {
            $tag = "manual"
          }
          $refName = "${{ github.ref_name }}"
          $override = "${{ github.event.inputs.version_override }}"
          if ($refName -match '^v\d') {
            $version = $refName.TrimStart('v')
          } elseif (-not [string]::IsNullOrWhiteSpace($override)) {
            $version = $override
          } else {
            $version = "0.0.0-dev"
          }

          $isccPath = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $isccPath `
            /DSetupVersion=$version `
            installer\babel-player.iss

          $installerPath = "dist\Babel-Player-$version-win-x64-setup.exe"
          if (-not (Test-Path $installerPath)) {
            throw "Installer not found at $installerPath"
          }

          $hash = (Get-FileHash -Path $installerPath -Algorithm SHA256).Hash.ToLowerInvariant()
          $checksumPath = "dist\Babel-Player-$version-win-x64-setup.sha256"
          "$hash  $(Split-Path $installerPath -Leaf)" | Set-Content -Path $checksumPath

          "installer_path=$installerPath"   | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "installer_checksum=$checksumPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append


      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: babel-player-${{ github.ref_name || 'manual' }}-win-x64-portable
          path: |
            ${{ steps.package.outputs.zip_path }}
            ${{ steps.package.outputs.checksum_path }}
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.zip_path }}
            ${{ steps.package.outputs.checksum_path }}
            ${{ steps.installer.outputs.installer_path }}
            ${{ steps.installer.outputs.installer_checksum }}
          body_path: docs/install-windows-release.md
          generate_release_notes: true
