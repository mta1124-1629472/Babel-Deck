name: Integration

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false
          clean: true
        env:
          GIT_LFS_SKIP_SMUDGE: '1'

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install faster-whisper googletrans==3.1.0a0 edge_tts

      - name: Restore
        run: dotnet restore Babel-Player.sln

      - name: Build
        run: dotnet build Babel-Player.sln --no-restore --configuration Release

      - name: Run integration tests
        run: >
          dotnet test BabelPlayer.Tests/BabelPlayer.Tests.csproj
          --no-build
          --configuration Release
          --filter "Category=Integration|Category=RequiresPython|Category=RequiresFfmpeg"
          --logger "trx;LogFileName=integration-results.trx"
          --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: TestResults/integration-results.trx
          retention-days: 3
