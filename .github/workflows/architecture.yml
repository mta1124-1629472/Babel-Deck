name: Architecture Guard

on:
  push:
    branches: [main]
    paths:
      - "Models/**"
      - "Services/**"
      - "ViewModels/**"
      - "Views/**"
      - "scripts/check-architecture.py"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "CONTRIBUTING.md"
      - ".github/workflows/architecture.yml"
  pull_request:
    branches: [main]
    paths:
      - "Models/**"
      - "Services/**"
      - "ViewModels/**"
      - "Views/**"
      - "scripts/check-architecture.py"
      - "AGENTS.md"
      - "CLAUDE.md"
      - "CONTRIBUTING.md"
      - ".github/workflows/architecture.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  layer-boundaries:
    name: Layer Boundary & Discipline Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify architecture checker exists
        run: test -f scripts/check-architecture.py

      - name: Run architecture checks
        run: python scripts/check-architecture.py
