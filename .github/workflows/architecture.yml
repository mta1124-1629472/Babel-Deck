name: Architecture Guard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  layer-boundaries:
    name: Layer Boundary & Discipline Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run architecture checks
        run: python3 scripts/check-architecture.py
