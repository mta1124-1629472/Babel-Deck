services:
  # Dev-only local inference host for the desktop app.
  inference:
    build:
      context: ./inference
      dockerfile: Dockerfile
    container_name: babel-inference
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      CUDA_VISIBLE_DEVICES: "0"
      LOG_LEVEL: info
    volumes:
      # Dev-only bind mount for rapid iteration on the service code.
      - ./inference:/app:ro
      - inference_cache:/root/.cache
    # GPU runtime configuration
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          cpus: '4'
          memory: 8G
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - babel-net
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

volumes:
  inference_cache:
    driver: local

networks:
  babel-net:
    driver: bridge
