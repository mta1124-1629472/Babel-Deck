version: '3.9'

services:
  # Python GPU inference service
  inference:
    build:
      context: ./inference
      dockerfile: Dockerfile
    container_name: babel-inference
    ports:
      - "8000:8000"
    environment:
      CUDA_VISIBLE_DEVICES: "0"
    volumes:
      - ./inference/main.py:/app/main.py
      - inference_cache:/root/.cache
    # GPU runtime configuration
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - babel-net

  # .NET desktop app (optional - for demo purposes)
  # In production, the C# app runs on the host and connects to the inference service
  
volumes:
  inference_cache:

networks:
  babel-net:
    driver: bridge
